spring:
  application:
    name: autoschedule
  data:
    redis:
      repositories:
        enabled: false

auth:
  jwt:
    secret: ${JWT_SECRET:local-development-secret-key-must-be-at-least-32-bytes}
    access-token-validity-seconds: ${JWT_ACCESS_TOKEN_VALIDITY_SECONDS:1800}
    refresh-token-validity-seconds: ${JWT_REFRESH_TOKEN_VALIDITY_SECONDS:1209600}

  social:
    google:
      audiences: ${GOOGLE_CLIENT_IDS}
    kakao:
      user-info-uri: ${KAKAO_USER_INFO_URI:https://kapi.kakao.com/v2/user/me}
    apple:
      client-id: ${APPLE_CLIENT_ID:}
      team-id: ${APPLE_TEAM_ID:}
      key-id: ${APPLE_KEY_ID:}
      private-key: ${APPLE_PRIVATE_KEY:}
      jwks-uri: ${APPLE_JWKS_URI:https://appleid.apple.com/auth/keys}
      token-uri: ${APPLE_TOKEN_URI:https://appleid.apple.com/auth/token}
