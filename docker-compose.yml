services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:?APP_PORT is required}:8080"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/${MYSQL_DATABASE:?MYSQL_DATABASE is required}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useUnicode=true"
      SPRING_DATASOURCE_USERNAME: "root"
      SPRING_DATASOURCE_PASSWORD: "${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}"
      SPRING_JPA_HIBERNATE_DDL_AUTO: "validate"
      SPRING_JPA_OPEN_IN_VIEW: "false"
      SPRING_SQL_INIT_MODE: "never"
      SPRING_DATA_REDIS_HOST: "redis"
      SPRING_DATA_REDIS_PORT: "6379"
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET is required}"
      JWT_ACCESS_TOKEN_VALIDITY_SECONDS: "${JWT_ACCESS_TOKEN_VALIDITY_SECONDS:?JWT_ACCESS_TOKEN_VALIDITY_SECONDS is required}"
      JWT_REFRESH_TOKEN_VALIDITY_SECONDS: "${JWT_REFRESH_TOKEN_VALIDITY_SECONDS:?JWT_REFRESH_TOKEN_VALIDITY_SECONDS is required}"
      GOOGLE_CLIENT_IDS: "${GOOGLE_CLIENT_IDS:?GOOGLE_CLIENT_IDS is required}"
      KAKAO_USER_INFO_URI: "${KAKAO_USER_INFO_URI:?KAKAO_USER_INFO_URI is required}"
      APPLE_CLIENT_ID: "${APPLE_CLIENT_ID:-}"
      APPLE_TEAM_ID: "${APPLE_TEAM_ID:-}"
      APPLE_KEY_ID: "${APPLE_KEY_ID:-}"
      APPLE_PRIVATE_KEY: "${APPLE_PRIVATE_KEY:-}"
      APPLE_JWKS_URI: "${APPLE_JWKS_URI:-https://appleid.apple.com/auth/keys}"
      APPLE_TOKEN_URI: "${APPLE_TOKEN_URI:-https://appleid.apple.com/auth/token}"
      FCM_ENABLED: "${FCM_ENABLED:-false}"
      FCM_CREDENTIALS_PATH: "${FCM_CREDENTIALS_PATH:-}"
      AWS_REGION: "${AWS_REGION:-ap-northeast-2}"
      AWS_S3_PROFILE_IMAGE_BUCKET: "${AWS_S3_PROFILE_IMAGE_BUCKET:-autoschedule-profile-image-local}"
      AWS_S3_PROFILE_IMAGE_PUBLIC_BASE_URL: "${AWS_S3_PROFILE_IMAGE_PUBLIC_BASE_URL:-https://static.example.com}"
      AWS_S3_PROFILE_IMAGE_OBJECT_KEY_PREFIX: "${AWS_S3_PROFILE_IMAGE_OBJECT_KEY_PREFIX:-profile-images}"
      AWS_S3_PROFILE_IMAGE_UPLOAD_URL_EXPIRES_SECONDS: "${AWS_S3_PROFILE_IMAGE_UPLOAD_URL_EXPIRES_SECONDS:-300}"
      AWS_S3_PROFILE_IMAGE_MAX_SIZE_BYTES: "${AWS_S3_PROFILE_IMAGE_MAX_SIZE_BYTES:-10485760}"
      AWS_S3_NOTICE_IMAGE_BUCKET: "${AWS_S3_NOTICE_IMAGE_BUCKET:-autoschedule-profile-image-local}"
      AWS_S3_NOTICE_IMAGE_PUBLIC_BASE_URL: "${AWS_S3_NOTICE_IMAGE_PUBLIC_BASE_URL:-https://static.example.com}"
      AWS_S3_NOTICE_IMAGE_OBJECT_KEY_PREFIX: "${AWS_S3_NOTICE_IMAGE_OBJECT_KEY_PREFIX:-notice-images}"
      AWS_S3_NOTICE_IMAGE_UPLOAD_URL_EXPIRES_SECONDS: "${AWS_S3_NOTICE_IMAGE_UPLOAD_URL_EXPIRES_SECONDS:-300}"
      AWS_S3_NOTICE_IMAGE_MAX_SIZE_BYTES: "${AWS_S3_NOTICE_IMAGE_MAX_SIZE_BYTES:-10485760}"
      NOTICE_IMAGE_MAX_COUNT: "${NOTICE_IMAGE_MAX_COUNT:-5}"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/actuator/health | grep -q 'UP'"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 40s

  mysql:
    image: mysql:8.4.0
    ports:
      - "${MYSQL_PORT:?MYSQL_PORT is required}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}"
      MYSQL_DATABASE: "${MYSQL_DATABASE:?MYSQL_DATABASE is required}"
      TZ: "Asia/Seoul"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+09:00
    volumes:
      - mysql-data:/var/lib/mysql
      - ./src/main/resources/db/DDL_V6.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
      - ./src/main/resources/db/DML_LOCAL_SEED.sql:/docker-entrypoint-initdb.d/002-local-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7.2-alpine
    ports:
      - "${REDIS_PORT:?REDIS_PORT is required}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql-data:
  redis-data:
